<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c2a14d"/>
    </marker>
    <marker id="arrowDim" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8b95a4"/>
    </marker>
    <style>
      .panel  { fill:#0f151c; stroke:rgba(194,161,77,0.18); stroke-width:1.5; }
      .node   { fill:#131a22; stroke:rgba(194,161,77,0.38); stroke-width:1.5; }
      .db     { fill:#131a22; stroke:#c2a14d; stroke-width:1.75; }
      .label  { fill:#ece9e0; font-size:22px; }
      .eyebrow{ fill:#c2a14d; font-family:Menlo,monospace; font-size:16px; letter-spacing:3px; }
      .sub    { fill:#5c6573; font-family:Menlo,monospace; font-size:13px; letter-spacing:2px; }
      .flow   { stroke:#c2a14d; stroke-width:2; fill:none; }
      .flowDim{ stroke:#8b95a4; stroke-width:2; stroke-dasharray:6 6; fill:none; }
      .caption{ fill:#8b95a4; font-family:Menlo,monospace; font-size:14px; letter-spacing:1px; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="900" fill="#0c1116"/>

  <!-- Title -->
  <text x="60" y="70" class="eyebrow">HOW IT WORKS · ARCHITECTURE</text>
  <text x="60" y="108" class="label" font-size="30" fill="#ece9e0">RAG = Retrieval + Generation</text>

  <!-- ================= INDEXING PANEL ================= -->
  <rect class="panel" x="60" y="150" width="660" height="690" rx="6"/>
  <text x="90" y="196" class="eyebrow">INDEXING</text>
  <text x="90" y="220" class="sub">ONE-TIME, PER DOCUMENT</text>

  <!-- nodes -->
  <g>
    <rect class="node" x="210" y="250" width="360" height="66" rx="4"/>
    <text x="390" y="290" class="label" text-anchor="middle">PDF Document</text>

    <rect class="node" x="210" y="366" width="360" height="66" rx="4"/>
    <text x="390" y="406" class="label" text-anchor="middle">Extract text</text>

    <rect class="node" x="210" y="482" width="360" height="66" rx="4"/>
    <text x="390" y="522" class="label" text-anchor="middle">Split into overlapping chunks</text>

    <rect class="node" x="210" y="598" width="360" height="66" rx="4"/>
    <text x="390" y="638" class="label" text-anchor="middle">Embed each chunk</text>

    <rect class="db" x="210" y="714" width="360" height="66" rx="4"/>
    <text x="390" y="748" class="label" text-anchor="middle">Vector DB</text>
    <text x="390" y="770" class="caption" text-anchor="middle">CHROMA · PERSISTED TO DISK</text>
  </g>

  <!-- arrows -->
  <path class="flow" d="M390,316 L390,366" marker-end="url(#arrow)"/>
  <path class="flow" d="M390,432 L390,482" marker-end="url(#arrow)"/>
  <path class="flow" d="M390,548 L390,598" marker-end="url(#arrow)"/>
  <path class="flow" d="M390,664 L390,714" marker-end="url(#arrow)"/>

  <!-- ================= ASKING PANEL ================= -->
  <rect class="panel" x="880" y="150" width="660" height="690" rx="6"/>
  <text x="910" y="196" class="eyebrow">ASKING QUESTIONS</text>
  <text x="910" y="220" class="sub">EACH QUERY</text>

  <g>
    <rect class="node" x="1030" y="250" width="360" height="66" rx="4"/>
    <text x="1210" y="290" class="label" text-anchor="middle">User question</text>

    <rect class="node" x="1030" y="428" width="360" height="86" rx="4"/>
    <text x="1210" y="464" class="label" text-anchor="middle">Embed question →</text>
    <text x="1210" y="492" class="label" text-anchor="middle">retrieve top-k chunks</text>

    <rect class="node" x="1030" y="598" width="360" height="66" rx="4"/>
    <text x="1210" y="632" class="label" text-anchor="middle">Local LLM</text>
    <text x="1210" y="654" class="caption" text-anchor="middle">GROUNDED PROMPT · llama3.2</text>

    <rect class="db" x="1030" y="714" width="360" height="66" rx="4"/>
    <text x="1210" y="754" class="label" text-anchor="middle">Answer</text>
  </g>

  <path class="flow" d="M1210,316 L1210,428" marker-end="url(#arrow)"/>
  <path class="flow" d="M1210,514 L1210,598" marker-end="url(#arrow)"/>
  <path class="flow" d="M1210,664 L1210,714" marker-end="url(#arrow)"/>

  <!-- cross arrow: Vector DB -> retrieve -->
  <path class="flowDim" d="M570,747 C720,747 760,471 1030,471" marker-end="url(#arrowDim)"/>
  <text x="800" y="600" class="caption" text-anchor="middle">retrieved chunks</text>
</svg>
